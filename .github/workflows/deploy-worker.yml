name: Deploy LINE Harness

on:
  workflow_dispatch:
  push:
    branches: [main, production]
    paths:
      - "apps/**"
      - "packages/**"
      - ".github/workflows/deploy-worker.yml"
      - ".line-harness-config.*.json"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'production' && 'prd' || 'dev' }}
    env:
      DEPLOY_ENV: ${{ github.ref_name == 'production' && 'prd' || 'dev' }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter create-line-harness build
      - run: pnpm deploy:update --env "$DEPLOY_ENV"
